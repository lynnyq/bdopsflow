
# ==============================================
# bdopsflow 查询接口 nginx 超时配置
# 专门为 Hive 等慢查询数据源优化的配置
# ==============================================

server {
    listen       80;
    server_name  localhost;
    client_max_body_size 100M;

    # 前端静态资源服务
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # 核心配置：查询接口单独超时配置
    # =======================================

    # 1. 查询执行接口 - 最长 30 分钟
    location ~ ^/api/v?\d*/query/execute$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 关键配置：延长查询超时时间
        proxy_connect_timeout 60s;       # 连接超时
        proxy_send_timeout 1800s;        # 发送超时 (30分钟)
        proxy_read_timeout 1800s;        # 读取超时 (30分钟)
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # 2. 查询取消接口 - 快速响应
    location ~ ^/api/v?\d*/query/cancel$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 3. 数据导出接口 - 30分钟
    location ~ ^/api/v?\d*/query/export$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }

    # 4. 数据源元数据查询 - 5分钟
    location ~ ^/api/v?\d*/datasource/metadata {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 其他 API - 5 分钟
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}

