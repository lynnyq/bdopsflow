
# bdopsflow Nginx 配置文件
# 针对数据源查询接口进行超时时间优化配置
# 支持多调度节点部署（已使用 Redis 分布式查询注册表）

# 基础全局超时配置
proxy_connect_timeout 60s;
proxy_send_timeout 300s;
proxy_read_timeout 300s;

# 主配置
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    # ==============================
    # 后端服务器组（多节点部署时配置多个节点）
    # ==============================
    upstream backend-server {
        # 多节点部署示例：
        # server 192.168.1.10:8080;
        # server 192.168.1.11:8080;
        # server 192.168.1.12:8080;

        # 单节点部署：
        server 127.0.0.1:8080;
    }

    server {
        listen       80;
        server_name  localhost;

        # 前端静态资源路由
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # API 代理 - 通用配置
        location /api/ {
            proxy_pass http://backend-server/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 通用超时配置 (5分钟)
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # ==============================
        # 数据源查询接口 - 单独配置更长超时时间
        # ==============================
        location /api/datasource/query/execute {
            proxy_pass http://backend-server/datasource/query/execute;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 数据源查询接口超时配置 - 30分钟 (针对 Hive 等查询较慢的数据源)
            proxy_connect_timeout 60s;
            proxy_send_timeout 1800s;   # 30分钟发送超时
            proxy_read_timeout 1800s;   # 30分钟读取超时
        }

        # ==============================
        # SSE 查询结果推送 - 关键配置
        # 必须禁用缓冲，否则事件会被 Nginx 缓存导致前端收不到实时推送
        # ==============================
        location ~ ^/api/v?\d*/query/stream/ {
            proxy_pass http://backend-server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';

            # SSE 关键配置：禁用所有缓冲
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;

            # SSE 超时配置 - 30分钟
            proxy_connect_timeout 60s;
            proxy_send_timeout 1800s;
            proxy_read_timeout 1800s;

            # SSE 不使用 chunked transfer encoding
            chunked_transfer_encoding off;
        }

        # 查询结果轮询接口
        location ~ ^/api/v?\d*/query/result/ {
            proxy_pass http://backend-server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # 查询取消接口
        location ~ ^/api/v?\d*/query/cancel/ {
            proxy_pass http://backend-server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 查询取消接口超时 - 快速响应
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /api/datasource/query/cancel {
            proxy_pass http://backend-server/datasource/query/cancel;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 查询取消接口超时 - 快速响应
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /api/datasource/query/export {
            proxy_pass http://backend-server/datasource/query/export;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 数据导出接口超时配置 - 30分钟
            proxy_connect_timeout 60s;
            proxy_send_timeout 1800s;
            proxy_read_timeout 1800s;
        }

        location /api/datasource/ {
            proxy_pass http://backend-server/datasource/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 其他数据源相关接口超时 - 5分钟
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
