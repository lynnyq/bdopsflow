syntax = "proto3";

package bdopsflow;

option go_package = "github.com/lynnyq/bdopsflow/proto";

service ExecutorService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc SubscribeTask(SubscribeTaskRequest) returns (stream Task);
  rpc ReportTaskResult(ReportTaskResultRequest) returns (ReportTaskResultResponse);
  rpc ReportTaskLog(ReportTaskLogRequest) returns (ReportTaskLogResponse);
  rpc ReportTaskProgress(ReportTaskProgressRequest) returns (ReportTaskProgressResponse);
  // 新添加：同步正在运行的任务状态（新调度器成为 leader 时调用）
  rpc SyncRunningTasks(SyncRunningTasksRequest) returns (SyncRunningTasksResponse);
}

// 正在运行任务的详细状态信息
message RunningTaskState {
  string execution_id = 1;
  int64 task_id = 2;
  int32 progress = 3;           // 进度 0-100
  string progress_message = 4;  // 进度信息
  int64 start_time = 5;         // 开始时间戳（Unix秒）
  string status = 6;            // 任务状态：running, pending 等
}

message RegisterRequest {
  string name = 1;
  string address = 2;
  int32 capacity = 3;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
  string executor_name = 3;
  bool duplicate = 4;
}

message HeartbeatRequest {
  string executor_name = 1;
  int32 current_load = 2;
  repeated string running_execution_ids = 3;
  // 新增：携带正在运行任务的详细状态（可选，用于新调度器任务恢复）
  repeated RunningTaskState running_tasks = 4;
  // 新增：表示此心跳是否是在检测到调度器变化后的首次心跳
  bool is_reconnect = 5;
}

message HeartbeatResponse {
  bool success = 1;
  string message = 2;
  int32 target_capacity = 3;
  // 新增：调度器是否希望执行器下次心跳时发送详细任务状态
  bool need_full_sync = 4;
  // 新增：调度器节点ID（用于检测调度器变化）
  string scheduler_node_id = 5;
  // 新增：是否是新的领导节点
  bool is_new_leader = 6;
  // 新增：该节点当前是否是领导节点
  bool is_leader = 7;
  // 新增：需要取消的任务执行ID列表
  repeated string cancel_execution_ids = 8;
}

message SubscribeTaskRequest {
  string executor_name = 1;
}

message Task {
  int64 task_id = 1;
  string execution_id = 2;
  string type = 3;
  string config = 4;
  int32 timeout_seconds = 5;
  int32 retry_count = 6;
  int32 retry_interval = 7;
}

message ReportTaskResultRequest {
  string execution_id = 1;
  int64 task_id = 2;
  string status = 3;
  string output = 4;
  string error = 5;
  int64 start_time = 6;
  int64 end_time = 7;
  int32 retry_times = 8;
}

message ReportTaskResultResponse {
  bool success = 1;
  string message = 2;
}

message ReportTaskLogRequest {
  string execution_id = 1;
  int64 task_id = 2;
  string log_level = 3;
  string log_content = 4;
  int64 timestamp = 5;
}

message ReportTaskLogResponse {
  bool success = 1;
  string message = 2;
}

message ReportTaskProgressRequest {
  string execution_id = 1;
  int64 task_id = 2;
  int32 progress = 3;
  string message = 4;
  int64 timestamp = 5;
}

message ReportTaskProgressResponse {
  bool success = 1;
  string message = 2;
}

// 新添加：同步正在运行任务的请求
message SyncRunningTasksRequest {
  string executor_name = 1;
}

// 新添加：同步正在运行任务的响应
message SyncRunningTasksResponse {
  bool success = 1;
  string message = 2;
  repeated RunningTaskState running_tasks = 3;
}
