syntax = "proto3";

package bdopsflow;

option go_package = "github.com/lynnyq/bdopsflow/proto";

service ExecutorService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc SubscribeTask(SubscribeTaskRequest) returns (stream Task);
  rpc ReportTaskResult(ReportTaskResultRequest) returns (ReportTaskResultResponse);
  rpc ReportTaskLog(ReportTaskLogRequest) returns (ReportTaskLogResponse);
}

message RegisterRequest {
  string executor_id = 1;
  string name = 2;
  string address = 3;
  int32 capacity = 4;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
}

message HeartbeatRequest {
  string executor_id = 1;
  int32 current_load = 2;
  repeated string running_execution_ids = 3;
}

message HeartbeatResponse {
  bool success = 1;
  string message = 2;
}

message SubscribeTaskRequest {
  string executor_id = 1;
}

message Task {
  int64 task_id = 1;
  string execution_id = 2;
  string type = 3;
  string config = 4;
  int32 timeout_seconds = 5;
  int32 retry_count = 6;
  int32 retry_interval = 7;
}

message ReportTaskResultRequest {
  string execution_id = 1;
  int64 task_id = 2;
  string status = 3;
  string output = 4;
  string error = 5;
  int64 start_time = 6;
  int64 end_time = 7;
  int32 retry_times = 8;
}

message ReportTaskResultResponse {
  bool success = 1;
  string message = 2;
}

message ReportTaskLogRequest {
  string execution_id = 1;
  int64 task_id = 2;
  string log_level = 3;
  string log_content = 4;
  int64 timestamp = 5;
}

message ReportTaskLogResponse {
  bool success = 1;
  string message = 2;
}
